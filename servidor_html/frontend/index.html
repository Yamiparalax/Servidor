<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidor Célula Python</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="material-icons">terminal</span>
                <span>Servidor.py</span>
            </div>
            <nav class="nav-menu" id="navMenu">
                <!-- Items populated via JS -->
                <a href="#" class="nav-item active" data-target="monitor">
                    <span class="material-icons">dashboard</span>
                    <span>Monitor</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-bar">
                <div class="search-bar">
                    <span class="material-icons">search</span>
                    <input type="text" placeholder="Buscar automação..." id="searchInput">
                </div>
                <div class="actions">
                    <button class="btn-icon" id="btnRefresh" title="Atualizar">
                        <span class="material-icons">refresh</span>
                    </button>
                    <button class="btn-icon" id="btnSettings" title="Configurações">
                        <span class="material-icons">settings</span>
                    </button>
                    <div class="profile">
                        <img src="https://via.placeholder.com/32" alt="User">
                    </div>
                </div>
            </header>

            <!-- Dashboard View -->
            <div id="view-monitor" class="view-section active">
                <!-- Status Columns -->
                <div class="monitor-grid">
                    <div class="monitor-col" id="col-rodando">
                        <h3>RODANDO AGORA</h3>
                        <div class="card-list" id="list-rodando"></div>
                    </div>
                    <div class="monitor-col" id="col-sucesso">
                        <h3>SUCESSO</h3>
                        <div class="card-list" id="list-sucesso"></div>
                    </div>
                    <div class="monitor-col" id="col-falha">
                        <h3>FALHA</h3>
                        <div class="card-list" id="list-falha"></div>
                    </div>
                </div>
            </div>

            <!-- Automations Grid View (hidden by default, shown for categories) -->
            <div id="view-automations" class="view-section" style="display:none;">
                <h2 id="categoryTitle">Categoria</h2>
                <div class="cards-grid" id="cardsGrid">
                    <!-- Cards populated via JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/static/js/app.js"></script>
</body>
</html>
